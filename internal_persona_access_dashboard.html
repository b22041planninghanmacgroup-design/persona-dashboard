<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내부 구성원 페르소나별 데이터 접근성 분석</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f9f9f7;color:#1a1a18;padding:1.5rem;font-size:14px}
.db{max-width:1280px;margin:0 auto}
.top-bar{margin-bottom:1.25rem}
.top-bar h1{font-size:20px;font-weight:500}
.top-bar p{font-size:12px;color:#73726c;margin-top:3px}
.notice{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px;background:#f1efe8;border:0.5px solid #d3d1c7;color:#5f5e5a;margin-top:6px}

.persona-grid{display:grid;grid-template-columns:repeat(10,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.pcard{border:0.5px solid #d3d1c7;border-radius:12px;padding:.7rem .6rem;cursor:pointer;transition:all .15s;background:#fff}
.pcard:hover{background:#f1efe8;border-color:#b4b2a9}
.pcard.active{border-width:1.5px;background:#f1efe8}
.pcard-icon{font-size:15px;margin-bottom:4px;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.pcard-group{font-size:9px;color:#73726c;margin-bottom:2px}
.pcard-name{font-size:12px;font-weight:500;line-height:1.3}
.pcard-tag{display:inline-block;margin-top:4px;font-size:9px;padding:1px 6px;border-radius:8px;line-height:1.4}

.main-grid{display:grid;grid-template-columns:290px minmax(0,1fr);gap:12px;margin-bottom:12px}
.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:1rem 1.25rem}
.card-title{font-size:13px;font-weight:500;margin-bottom:.75rem;color:#1a1a18}

.pd-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pd-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.pd-name{font-size:14px;font-weight:500}
.pd-role{font-size:11px;color:#73726c;margin-top:2px}
.pd-desc{font-size:11px;color:#5f5e5a;line-height:1.6;padding:.55rem .7rem;border-radius:8px;background:#f1efe8;margin-bottom:8px}
.pd-goals{margin-bottom:8px}
.pd-goal{font-size:11px;color:#5f5e5a;display:flex;align-items:flex-start;gap:5px;line-height:1.5;padding:1px 0}
.pd-goal::before{content:'›';color:#b4b2a9;flex-shrink:0}
.pd-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.pd-stat{background:#f1efe8;border-radius:8px;padding:.45rem .5rem;text-align:center}
.pd-stat .sv{font-size:17px;font-weight:500}
.pd-stat .sl{font-size:10px;color:#73726c;margin-top:1px}
.pain-title{font-size:10px;font-weight:500;color:#73726c;margin-bottom:3px}
.pain-item{font-size:11px;color:#5f5e5a;padding:2px 0 2px 8px;border-left:2px solid #E24B4A;margin-bottom:3px;line-height:1.4}

.scenario-list{display:flex;flex-direction:column;gap:6px}
.srow{border:0.5px solid #d3d1c7;border-radius:8px;padding:.6rem .8rem;transition:background .1s}
.srow:hover{background:#f1efe8}
.srow-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:9px;font-size:10px;font-weight:500;white-space:nowrap}
.b-s{background:#EAF3DE;color:#3B6D11}
.b-m{background:#FAEEDA;color:#854F0B}
.b-c{background:#FCEBEB;color:#A32D2D}
.srow-title{font-size:12px;font-weight:500;flex:1;min-width:120px}
.srow-meta{display:flex;gap:10px}
.srow-stat{font-size:11px;color:#73726c;white-space:nowrap}
.srow-stat strong{color:#1a1a18;font-weight:500}
.srow-path{font-size:11px;color:#73726c;line-height:1.4;margin-top:2px}
.srow-pain{font-size:10px;margin-top:4px;padding:2px 7px;border-radius:6px;display:inline-block}

.bottom-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px}
.chart-wrap{position:relative;width:100%}
.legend-row{display:flex;gap:12px;margin-bottom:6px;font-size:11px;color:#73726c;flex-wrap:wrap}
.leg-dot{display:flex;align-items:center;gap:4px}
.leg-sq{width:10px;height:10px;border-radius:2px;display:inline-block}

@media(max-width:1000px){
  .persona-grid{grid-template-columns:repeat(5,minmax(0,1fr))}
  .main-grid{grid-template-columns:1fr}
  .bottom-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="db">
  <div class="top-bar">
    <h1>내부 구성원 페르소나별 데이터 접근성 분석</h1>
    <p>10개 내부 페르소나 · 30개 시나리오 · 클릭 수 / 카테고리 횡단 / Pain Point 분석</p>

  </div>

  <div class="persona-grid" id="persona-grid"></div>

  <div class="main-grid">
    <div class="card">
      <div class="card-title" id="detail-title">페르소나 프로필</div>
      <div id="persona-detail"></div>
    </div>
    <div class="card">
      <div class="card-title" id="scenario-title">시나리오 상세</div>
      <div class="scenario-list" id="scenario-list"></div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="card">
      <div class="card-title">페르소나별 복잡도 클릭 수 비교</div>
      <div class="legend-row">
        <span class="leg-dot"><span class="leg-sq" style="background:#70AD47"></span>단순</span>
        <span class="leg-dot"><span class="leg-sq" style="background:#FFC000"></span>중간</span>
        <span class="leg-dot"><span class="leg-sq" style="background:#E24B4A"></span>복잡</span>
      </div>
      <div class="chart-wrap" style="height:260px"><canvas id="chart-bar"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">접근 난이도 히트맵 (클릭 수 기준)</div>
      <div id="heatmap-container" style="margin-top:6px"></div>
    </div>
  </div>
</div>

let activeId = 'teamlead';
let barChart = null;

function renderGrid() {
  document.getElementById('persona-grid').innerHTML = P.map(p => `
    <div class="pcard ${p.id === activeId ? 'active' : ''}" onclick="sel('${p.id}')"
      style="${p.id === activeId ? `border-color:${p.color}` : ''}">
      <div class="pcard-icon" style="background:${p.bg}">${p.icon}</div>
      <div class="pcard-group">${p.group}</div>
      <div class="pcard-name">${p.name}</div>
      <span class="pcard-tag" style="background:${p.tc};color:${p.tt}">${p.role}</span>
    </div>`).join('');
}

function renderDetail(p) {
  document.getElementById('detail-title').textContent = `${p.icon} ${p.name} — 프로필`;
  document.getElementById('persona-detail').innerHTML = `
    <div class="pd-header">
      <div class="pd-avatar" style="background:${p.bg}">${p.icon}</div>
      <div><div class="pd-name">${p.name}</div><div class="pd-role">${p.role} · ${p.group}</div></div>
    </div>
    <div class="pd-desc">${p.desc}</div>
    <div class="pd-goals">${p.goals.map(g => `<div class="pd-goal">${g}</div>`).join('')}</div>
    <div class="pd-stats">
      <div class="pd-stat"><div class="sv" style="color:${p.color}">${p.ac[0]}</div><div class="sl">단순 클릭</div></div>
      <div class="pd-stat"><div class="sv" style="color:${p.color}">${p.ac[1]}</div><div class="sl">중간 클릭</div></div>
      <div class="pd-stat"><div class="sv" style="color:${p.color}">${p.ac[2]}</div><div class="sl">복잡 클릭</div></div>
    </div>
    <div class="pain-title">주요 Pain Points</div>
    ${p.pains.map(pt => `<div class="pain-item">${pt}</div>`).join('')}`;
}

function renderScenarios(p) {
  const bc = { 단순: 'b-s', 중간: 'b-m', 복잡: 'b-c' };
  const pb = { 단순: '#EAF3DE', 중간: '#FAEEDA', 복잡: '#FCEBEB' };
  const pc = { 단순: '#3B6D11', 중간: '#854F0B', 복잡: '#A32D2D' };
  document.getElementById('scenario-title').textContent = `${p.icon} ${p.name} 시나리오 상세`;
  document.getElementById('scenario-list').innerHTML = p.scenarios.map(s => `
    <div class="srow">
      <div class="srow-top">
        <span class="badge ${bc[s.lv]}">${s.lv}</span>
        <span class="srow-title">${s.t}</span>
        <div class="srow-meta">
          <span class="srow-stat"><strong>${s.c}</strong> 클릭</span>
          <span class="srow-stat"><strong>${s.cat}</strong> 카테고리</span>
          <span class="srow-stat">${s.time}</span>
        </div>
      </div>
      <div class="srow-path">${s.path}</div>
      ${s.pain !== '없음' ? `<span class="srow-pain" style="background:${pb[s.lv]};color:${pc[s.lv]}">⚠ ${s.pain}</span>` : ''}
    </div>`).join('');
}

function renderBar() {
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('chart-bar'), {
    type: 'bar',
    data: {
      labels: P.map(p => p.name),
      datasets: [
        { label: '단순', data: P.map(p => p.ac[0]), backgroundColor: '#70AD47', borderRadius: 2 },
        { label: '중간', data: P.map(p => p.ac[1]), backgroundColor: '#FFC000', borderRadius: 2 },
        { label: '복잡', data: P.map(p => p.ac[2]), backgroundColor: '#E24B4A', borderRadius: 2 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#73726c', font: { size: 10 }, autoSkip: false, maxRotation: 40 }, grid: { color: 'rgba(0,0,0,0.06)' } },
        y: { ticks: { color: '#73726c', font: { size: 10 } }, grid: { color: 'rgba(0,0,0,0.06)' }, beginAtZero: true }
      }
    }
  });
}

function renderHeatmap() {
  const levels = ['단순', '중간', '복잡'];
  const allMax = Math.max(...P.map(p => Math.max(...p.ac)));
  const cols = {
    단순: ['#C7E6B0', '#A5D07E', '#70AD47'],
    중간: ['#FAD89A', '#F7C25E', '#EF9F27'],
    복잡: ['#F5AFAF', '#EE7070', '#E24B4A']
  };
  let html = `<div style="display:grid;gap:3px">
    <div style="display:flex;gap:3px;margin-bottom:2px">
      <div style="width:48px"></div>
      ${P.map(p => `<div style="flex:1;font-size:9px;color:#73726c;text-align:center;line-height:1.2">${p.name}</div>`).join('')}
    </div>`;
  levels.forEach((lv, li) => {
    html += `<div style="display:flex;align-items:center;gap:3px">
      <div style="width:48px;text-align:right;font-size:10px;color:#73726c;padding-right:5px">${lv}</div>
      ${P.map(p => {
        const v = p.ac[li];
        const idx = Math.min(Math.round((v / allMax) * 2), 2);
        return `<div style="flex:1;height:24px;border-radius:3px;background:${cols[lv][idx]};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#2c2c2a">${v}</div>`;
      }).join('')}
    </div>`;
  });
  html += `</div>`;
  document.getElementById('heatmap-container').innerHTML = html;
}

function sel(id) {
  activeId = id;
  const p = P.find(x => x.id === id);
  renderGrid();
  renderDetail(p);
  renderScenarios(p);
}

renderGrid();
sel('teamlead');
window.addEventListener('load', () => { renderBar(); renderHeatmap(); });
setTimeout(() => { renderBar(); renderHeatmap(); }, 200);
</script>
